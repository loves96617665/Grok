name = "grok-mirror"
main = "src/index.ts"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

# Workers 配置
workers_dev = true
route = { pattern = "grok.yourdomain.com/*", zone_name = "yourdomain.com" }

# 環境變量
[vars]
ENVIRONMENT = "production"
ENABLE_MIRROR_API = "true"
API_HATD = "true"

# 密鑰（使用 wrangler secret put 設置）
# wrangler secret put ADMIN_PASSWORD
# wrangler secret put AUTHORIZATION
# wrangler secret put GROK_API_KEY

# KV 命名空間（Token 存儲）
[[kv_namespaces]]
binding = "TOKENS"
id = "4aa59f73db4340ecb3c2814c6077003c"
preview_id = "4aa59f73db4340ecb3c2814c6077003c"

# KV 命名空間（會話存儲）
[[kv_namespaces]]
binding = "SESSIONS"
id = "8f23ff01997f43bf994865a4b00d0b13"
preview_id = "8f23ff01997f43bf994865a4b00d0b13"

# KV 命名空間（緩存）
[[kv_namespaces]]
binding = "CACHE"
id = "14e26538d07c4261ad7fe3d4c820c2dd"
preview_id = "14e26538d07c4261ad7fe3d4c820c2dd"

# D1 數據庫
[[d1_databases]]
binding = "DB"
database_name = "grok-mirror-db"
database_id = "42a97679-f232-4802-9077-1b239c35aabb"


# Durable Objects（用於 WebSocket 支持，可選）
# [[durable_objects.bindings]]
# name = "CHAT_ROOM"
# class_name = "ChatRoom"
# script_name = "grok-mirror"

# 速率限制
[limits]
cpu_ms = 50

# 開發環境
[env.dev]
name = "grok-mirror-dev"
workers_dev = true

[env.dev.vars]
ENVIRONMENT = "development"



