name = "grok"
main = "src/index.ts"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

# Workers 配置
workers_dev = true

# 環境變量
[vars]
ENVIRONMENT = "production"
ENABLE_MIRROR_API = "true"
API_HATD = "true"

# KV 命名空間
[[kv_namespaces]]
binding = "KV"
id = "2bf402fcde154033b7d7169ed6cfad07"

# D1 數據庫
[[d1_databases]]
binding = "DB"
database_name = "grok-mirror-db"
database_id = "42a97679-f232-4802-9077-1b239c35aabb"

# 開發環境
[env.dev]
name = "grok-dev"
workers_dev = true

[env.dev.vars]
ENVIRONMENT = "development"
